<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常管家 - 穩定同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- QR Code 相關庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .nav-btn.active { background-color: #4f46e5; color: white; }
        .low-stock-card { border: 2px solid #fee2e2 !important; background-color: #fffafb !important; }
        .low-stock-text { color: #dc2626 !important; font-weight: 900 !important; }
        .location-header { border-left: 4px solid #10b981; padding-left: 0.75rem; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .month-pill { cursor: pointer; transition: all 0.2s; }
        .month-pill.active { background-color: #4f46e5; color: white; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800">
    <div class="max-w-5xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-indigo-600">日常管家系統</h1>
            <p class="text-gray-500">穩定使用版 (A子, B子, GULU)</p>
        </header>

        <!-- 導航列 -->
        <div class="flex justify-center mb-8 gap-2 flex-wrap">
            <button onclick="switchTab('expense')" id="btn-expense" class="nav-btn active px-5 py-2 rounded-full transition font-medium">💰 開支</button>
            <button onclick="switchTab('inventory')" id="btn-inventory" class="nav-btn px-5 py-2 rounded-full bg-white transition font-medium text-gray-600">📦 存貨</button>
            <button onclick="switchTab('sync')" id="btn-sync" class="nav-btn px-5 py-2 rounded-full bg-white transition font-medium text-gray-600">🔄 同步中心</button>
        </div>

        <!-- 1. 開支分頁 -->
        <div id="tab-expense" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 glass-card p-6 h-fit">
                    <h2 class="text-xl font-semibold mb-4">新增支出</h2>
                    <form id="expenseForm" class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-xs text-indigo-600 font-bold ml-1">選擇日期</label>
                            <input type="date" id="expDate" required class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-200 outline-none">
                        </div>
                        <input type="number" id="amount" required step="0.1" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-indigo-200 outline-none" placeholder="金額 (HKD)">
                        <select id="member" class="w-full p-2 border rounded-md">
                            <option value="A子">👤 A子</option>
                            <option value="B子">👤 B子</option>
                            <option value="GULU">🐾 GULU</option>
                        </select>
                        <select id="category" class="w-full p-2 border rounded-md">
                            <option value="餐飲">🍔 餐飲</option><option value="交通">🚌 交通</option>
                            <option value="購物">🛍️ 購物</option><option value="Facial">🧖‍♀️ Facial</option>
                            <option value="Gym">💪 Gym</option><option value="股票">📈 股票</option>
                            <option value="其他">✨ 其他</option>
                        </select>
                        <input type="text" id="note" class="w-full p-2 border rounded-md" placeholder="備註">
                        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition font-bold">紀錄支出</button>
                    </form>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="glass-card p-4 overflow-x-auto">
                        <div class="flex items-center gap-2" id="monthSelector"></div>
                    </div>

                    <div class="glass-card p-6 flex flex-col md:flex-row items-center gap-6">
                        <div class="w-full md:w-1/2 h-48"><canvas id="expenseChart"></canvas></div>
                        <div class="w-full md:w-1/2 text-center md:text-left">
                            <p id="selectedMonthTitle" class="text-sm text-gray-500 font-bold">本月總開支</p>
                            <p id="totalDisplay" class="text-3xl font-bold text-indigo-600">HK$ 0</p>
                            <div id="memberSummary" class="mt-4 space-y-1 text-sm text-gray-600 border-t pt-2"></div>
                        </div>
                    </div>

                    <div class="glass-card p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="font-bold text-gray-700">開支明細 <span class="text-xs font-normal text-gray-400">(格式：日/月/年)</span></h2>
                            <button onclick="exportExcel('expense')" class="text-xs bg-indigo-50 text-indigo-600 px-3 py-1 rounded-md border border-indigo-100">匯出 Excel</button>
                        </div>
                        <div class="overflow-x-auto text-sm">
                            <table class="w-full text-left">
                                <thead class="bg-gray-50 text-gray-400 text-[10px] uppercase tracking-wider">
                                    <tr>
                                        <th class="py-2 px-2">日期 (D/M/Y)</th>
                                        <th class="py-2">人物</th>
                                        <th class="py-2">分類</th>
                                        <th class="py-2 text-right">金額</th>
                                        <th class="py-2 text-center">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="expenseBody" class="text-gray-600"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. 存貨分頁 -->
        <div id="tab-inventory" class="tab-content hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 glass-card p-6 h-fit">
                    <h2 class="text-xl font-semibold mb-4 text-emerald-700">新增存貨</h2>
                    <form id="inventoryForm" class="space-y-4">
                        <input type="text" id="invName" required class="w-full p-2 border rounded-md outline-none" placeholder="物品名稱">
                        <select id="invLoc" class="w-full p-2 border rounded-md">
                            <option value="廚房">🍳 廚房</option><option value="浴室">🚿 浴室</option>
                            <option value="雪櫃">❄️ 雪櫃</option><option value="儲物櫃">🚪 儲物櫃</option>
                        </select>
                        <input type="number" id="invQty" required class="w-full p-2 border rounded-md outline-none" placeholder="數量">
                        <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded-md hover:bg-emerald-700 transition font-bold">加入存貨</button>
                    </form>
                </div>
                <div class="lg:col-span-2 glass-card p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-bold text-gray-700">存貨明細</h2>
                        <button onclick="exportExcel('inventory')" class="text-xs bg-emerald-50 text-emerald-600 px-3 py-1 rounded-md border border-emerald-100">匯出 Excel</button>
                    </div>
                    <div id="inventoryContainer"></div>
                </div>
            </div>
        </div>

        <!-- 3. 同步中心分頁 -->
        <div id="tab-sync" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 輸出數據 -->
                <div class="glass-card p-6 text-center">
                    <h2 class="text-xl font-bold mb-4 text-indigo-600">📱 傳出數據</h2>
                    <div class="space-y-3">
                        <button onclick="generateSyncQR()" class="bg-indigo-600 text-white px-6 py-2 rounded-md w-full font-bold">產生同步 QR Code</button>
                        <div id="qrcode" class="flex justify-center bg-white p-2 rounded-lg border inline-block mx-auto min-h-[200px]"></div>
                        <div class="border-t pt-4">
                            <p class="text-xs text-gray-400 mb-2">或者傳送文字代碼：</p>
                            <textarea id="syncOutput" readonly class="w-full h-16 p-2 text-[10px] border rounded-md bg-gray-50 mb-2" placeholder="同步代碼..."></textarea>
                            <button onclick="copySyncCode()" class="text-xs text-indigo-600 underline">複製文字代碼</button>
                        </div>
                    </div>
                </div>

                <!-- 匯入數據 (含上傳功能) -->
                <div class="glass-card p-6 text-center">
                    <h2 class="text-xl font-bold mb-4 text-emerald-700">📥 匯入數據</h2>
                    
                    <!-- 掃描與圖片上傳區 -->
                    <div class="space-y-4">
                        <div id="reader" class="mb-2"></div>
                        <div class="flex gap-2">
                            <button id="startScanBtn" onclick="startScanner()" class="flex-1 bg-emerald-600 text-white py-2 rounded-md font-bold text-sm">開啟相機掃描</button>
                            <button id="stopScanBtn" onclick="stopScanner()" class="hidden flex-1 bg-red-500 text-white py-2 rounded-md font-bold text-sm">關閉相機</button>
                        </div>
                        
                        <div class="relative group">
                            <input type="file" id="qrFileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="uploadQR(event)">
                            <div class="border-2 border-dashed border-emerald-200 rounded-lg py-4 bg-emerald-50 group-hover:bg-emerald-100 transition">
                                <p class="text-emerald-700 text-sm font-medium">📤 上傳 QR Code 圖片</p>
                                <p class="text-[10px] text-emerald-500">選取手機中的截圖進行匯入</p>
                            </div>
                        </div>

                        <div class="border-t pt-4">
                            <p class="text-xs text-gray-500 mb-2">手動貼上代碼：</p>
                            <textarea id="syncInput" class="w-full h-16 p-2 text-[10px] border rounded-md mb-2" placeholder="貼上家人分享的代碼..."></textarea>
                            <button onclick="importSyncCode()" class="w-full bg-emerald-100 text-emerald-700 py-2 rounded-md text-sm font-bold">確認匯入數據</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-2 rounded-full opacity-0 transition-opacity pointer-events-none z-50"></div>

    <script>
        let state = {
            expenses: JSON.parse(localStorage.getItem('gulu_expenses')) || [],
            inventory: JSON.parse(localStorage.getItem('gulu_inventory')) || []
        };

        let currentMonthFilter = new Date().toISOString().slice(0, 7);
        let chartObj = null;
        let html5QrCode = null;

        window.onload = () => {
            document.getElementById('expDate').valueAsDate = new Date();
            renderAll();
        };

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active', 'bg-indigo-600', 'text-white');
                b.classList.add('bg-white', 'text-gray-600');
            });
            const activeBtn = document.getElementById(`btn-${tab}`);
            activeBtn.classList.add('active', 'bg-indigo-600', 'text-white');
            if(tab === 'expense') renderAll();
            if(tab !== 'sync') stopScanner();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        // --- 同步核心邏輯 ---
        function generateSyncQR() {
            const code = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
            document.getElementById('syncOutput').value = code;
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, {
                text: code, width: 200, height: 200, colorDark : "#4f46e5", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.L
            });
            showToast("QR Code 已產生");
        }

        function copySyncCode() {
            const code = document.getElementById('syncOutput').value;
            if(!code) return showToast("請先產生代碼");
            navigator.clipboard.writeText(code).then(() => showToast("文字代碼已複製"));
        }

        // 相機掃描
        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            document.getElementById('startScanBtn').classList.add('hidden');
            document.getElementById('stopScanBtn').classList.remove('hidden');
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                document.getElementById('syncInput').value = text;
                stopScanner();
                importSyncCode();
            }).catch(err => { alert("相機啟動失敗: " + err); stopScanner(); });
        }

        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    document.getElementById('startScanBtn').classList.remove('hidden');
                    document.getElementById('stopScanBtn').classList.add('hidden');
                });
            }
        }

        // 上傳 QR Code 圖片功能
        function uploadQR(event) {
            const file = event.target.files[0];
            if (!file) return;
            const html5QrCodeFile = new Html5Qrcode("reader");
            html5QrCodeFile.scanFile(file, true)
                .then(decodedText => {
                    document.getElementById('syncInput').value = decodedText;
                    importSyncCode();
                })
                .catch(err => {
                    alert("無法讀取該圖片中的 QR Code，請確認圖片清晰。");
                });
            event.target.value = ""; // 重置 input
        }

        window.importSyncCode = () => {
            try {
                const code = document.getElementById('syncInput').value;
                if(!code) return;
                const imported = JSON.parse(decodeURIComponent(escape(atob(code))));
                if(imported.expenses) { 
                    if(confirm("即將覆蓋本地數據，確定匯入嗎？")) {
                        state = imported; 
                        save(); 
                        renderAll(); 
                        showToast("✅ 數據匯入成功！"); 
                        document.getElementById('syncInput').value = "";
                    }
                }
            } catch(e) { 
                alert("錯誤：無效的數據格式！"); 
            }
        };

        // --- 數據處理邏輯 ---
        function save() {
            localStorage.setItem('gulu_expenses', JSON.stringify(state.expenses));
            localStorage.setItem('gulu_inventory', JSON.stringify(state.inventory));
        }

        document.getElementById('expenseForm').onsubmit = (e) => {
            e.preventDefault();
            const rawDate = document.getElementById('expDate').value;
            const newItem = {
                id: Date.now(),
                amount: parseFloat(document.getElementById('amount').value),
                member: document.getElementById('member').value,
                category: document.getElementById('category').value,
                note: document.getElementById('note').value || '-',
                date: rawDate,
                month: rawDate.slice(0, 7)
            };
            state.expenses.unshift(newItem);
            currentMonthFilter = newItem.month;
            save(); renderAll(); e.target.reset();
            document.getElementById('expDate').valueAsDate = new Date();
            showToast("開支紀錄成功");
        };

        document.getElementById('inventoryForm').onsubmit = (e) => {
            e.preventDefault();
            const newItem = {
                id: Date.now(),
                name: document.getElementById('invName').value,
                location: document.getElementById('invLoc').value,
                qty: parseInt(document.getElementById('invQty').value)
            };
            state.inventory.unshift(newItem);
            save(); renderAll(); e.target.reset();
        };

        window.updateQty = (id, delta) => {
            const item = state.inventory.find(i => i.id === id);
            if(item) { item.qty = Math.max(0, item.qty + delta); save(); renderAll(); }
        };

        window.delItem = (type, id) => {
            if(confirm("確定刪除？")) {
                state[type] = state[type].filter(x => x.id !== id);
                save(); renderAll();
            }
        };

        function setMonthFilter(month) {
            currentMonthFilter = month;
            renderAll();
        }

        window.exportExcel = (type) => {
            const data = type === 'expense' ? state.expenses.filter(i => i.month === currentMonthFilter) : state.inventory;
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, `${type}_${currentMonthFilter}.xlsx`);
        };

        // --- 畫面渲染邏輯 ---
        function renderAll() {
            renderMonthSelector();
            renderExpenseTable();
            renderInventory();
            renderChart();
        }

        function renderMonthSelector() {
            const selector = document.getElementById('monthSelector');
            const months = new Set(state.expenses.map(i => i.month));
            months.add(new Date().toISOString().slice(0, 7));
            const sortedMonths = Array.from(months).sort().reverse();
            selector.innerHTML = sortedMonths.map(m => {
                const [y, mm] = m.split('-');
                return `<div onclick="setMonthFilter('${m}')" class="month-pill flex-shrink-0 px-4 py-1 rounded-full text-xs border ${currentMonthFilter === m ? 'active' : 'bg-white text-gray-500'}">${mm}/${y}</div>`
            }).join('');
            const [filterY, filterM] = currentMonthFilter.split('-');
            document.getElementById('selectedMonthTitle').innerText = `${filterM}/${filterY} 總開支`;
        }

        function renderExpenseTable() {
            const body = document.getElementById('expenseBody');
            const filtered = state.expenses.filter(i => i.month === currentMonthFilter);
            const totals = { "A子": 0, "B子": 0, "GULU": 0 };
            filtered.forEach(i => totals[i.member] = (totals[i.member] || 0) + i.amount);
            const grandTotal = Object.values(totals).reduce((a, b) => a + b, 0);
            document.getElementById('totalDisplay').innerText = `HK$ ${grandTotal.toLocaleString()}`;
            document.getElementById('memberSummary').innerHTML = Object.entries(totals).map(([name, val]) => `<div class="flex justify-between"><span>${name}</span><span class="font-bold">$${val.toLocaleString()}</span></div>`).join('');
            if (filtered.length === 0) {
                body.innerHTML = `<tr><td colspan="5" class="py-10 text-center text-gray-400">本月無資料</td></tr>`;
                return;
            }
            body.innerHTML = filtered.map(i => {
                const [y, m, d] = i.date.split('-');
                return `<tr class="border-b last:border-0 hover:bg-gray-50 transition"><td class="py-3 px-2 text-[11px] font-bold text-gray-500">${d}/${m}/${y}</td><td class="font-bold">${i.member}</td><td><span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full text-[10px]">${i.category}</span></td><td class="text-right font-bold text-indigo-600">$${i.amount.toLocaleString()}</td><td class="text-center"><button onclick="delItem('expenses', ${i.id})" class="text-gray-300 hover:text-red-500">🗑️</button></td></tr>`
            }).join('');
        }

        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            if (!container) return;
            const groups = state.inventory.reduce((acc, item) => {
                const loc = item.location || "未分類";
                if (!acc[loc]) acc[loc] = [];
                acc[loc].push(item);
                return acc;
            }, {});
            container.innerHTML = Object.keys(groups).sort().map(loc => `
                <div class="mb-6">
                    <h3 class="location-header font-bold text-gray-800 text-lg">${loc}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${groups[loc].map(i => `<div class="glass-card p-4 border-2 ${i.qty < 3 ? 'low-stock-card' : 'border-transparent'}"><div class="flex justify-between items-center"><span class="font-bold">${i.name}</span><button onclick="delItem('inventory', ${i.id})" class="text-gray-300">❌</button></div><div class="flex justify-between items-center mt-3"><span class="text-3xl font-black ${i.qty < 3 ? 'low-stock-text' : ''}">${i.qty}</span><div class="flex gap-2"><button onclick="updateQty(${i.id}, -1)" class="w-10 h-10 bg-white border rounded-full">-</button><button onclick="updateQty(${i.id}, 1)" class="w-10 h-10 bg-indigo-50 text-indigo-600 border rounded-full">+</button></div></div></div>`).join('')}
                    </div>
                </div>`).join('');
        }

        function renderChart() {
            const canvas = document.getElementById('expenseChart');
            if(!canvas) return;
            const filtered = state.expenses.filter(i => i.month === currentMonthFilter);
            const dataMap = {};
            filtered.forEach(i => dataMap[i.category] = (dataMap[i.category] || 0) + i.amount);
            if(chartObj) chartObj.destroy();
            chartObj = new Chart(canvas, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(dataMap),
                    datasets: [{ data: Object.values(dataMap), backgroundColor: ['#6366f1','#ec4899','#10b981','#f59e0b','#3b82f6','#ef4444','#8b5cf6'] }]
                },
                options: { plugins: { legend: { display: false } }, cutout: '75%', maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
